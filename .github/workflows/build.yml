name: Build Android Musl (cross + nix + strip)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross

      - name: Cross build release
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Strip binary
        run: |
          cross run --target aarch64-unknown-linux-musl -- \
            aarch64-linux-musl-strip target/aarch64-unknown-linux-musl/release/anr_tool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anr_tool-android-musl
          path: target/aarch64-unknown-linux-musl/release/anr_tool
