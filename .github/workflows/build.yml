name: Build with cross + nix + strip
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Rust 工具链 + 编译目标
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # 安装 cross 工具
      - name: Install cross
        run: cargo install cross

      # cross 编译 release 版本
      - name: Cross build
        run: cross build --release --target aarch64-unknown-linux-musl

      # 在 cross 容器内执行 strip 精简二进制
      - name: Strip binary
        run: |
          cross run --target aarch64-unknown-linux-musl -- \
            aarch64-linux-musl-strip target/aarch64-unknown-linux-musl/release/anr_tool

      # 上传编译产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anr_tool-android-musl
          path: target/aarch64-unknown-linux-musl/release/anr_tool
