name: Build Android Native (cross + nix + strip)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cross
        run: cargo install cross

      - name: Cross build release
        run: cross build --release --target aarch64-linux-android

      - name: Strip 瘦身
        run: |
          cross run --target aarch64-linux-android -- \
            aarch64-linux-android-strip target/aarch64-linux-android/release/anr_tool

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: anr_tool-android-native
          path: target/aarch64-linux-android/release/anr_tool
